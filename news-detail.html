<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지 — k.veritas</title>
  <meta name="description" content="k.veritas 공지사항 — 새로운 소식과 공지를 전해 드립니다." />
  <link rel="canonical" href="https://leeuhyuk.github.io/k.veritas/news-detail.html" />
  <meta property="og:type" content="article" />

</head>
<body class="site-hp">
  <div id="site-nav"></div>

  <main>
    <section class="page">
      <div class="detail" id="detail"><p class="empty-note">불러오는 중…</p></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="site-base.js?v=20260720a"></script>
  <script src="site.js?v=20260720d"></script>
  <script src="sanitize-html.js"></script>
  <script src="detail-lightbox.js"></script>
  <script>
    (function () {
      const root = document.getElementById('detail');
      const esc = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
      const fmt = (iso) => { try { return new Date(iso).toLocaleDateString('ko-KR'); } catch (e) { return ''; } };
      const renderBody = (b) => {
        b = b || '';
        if (/<[a-z][\s\S]*>/i.test(b)) {
          return typeof sanitizeHtml === 'function' ? sanitizeHtml(b) : b;
        }
        return esc(b).split(/\n{2,}/).map((p) => `<p>${p.replace(/\n/g, '<br/>')}</p>`).join('');
      };
      const upsertMeta = (selector, attr, name, value) => {
        if (!value) return;
        let el = document.querySelector(selector);
        if (!el) { el = document.createElement('meta'); el.setAttribute(attr, name); document.head.appendChild(el); }
        el.setAttribute('content', value);
      };
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { root.innerHTML = '<p class="empty-note">잘못된 접근입니다.</p>'; return; }

      // Firebase(Firestore) 단일 소스 — 관리자 발행 인덱스(pages/news-index)에서 조회
      const NEWS_INDEX = 'https://firestore.googleapis.com/v1/projects/production-management-e70fd/databases/(default)/documents/pages/news-index';
      const fetchNews = () => fetch(NEWS_INDEX, { cache: 'no-store' })
        .then((r) => { if (!r.ok) throw new Error(); return r.json(); })
        .then((doc) => {
          const s = doc && doc.fields && doc.fields.json && doc.fields.json.stringValue;
          if (!s) throw new Error();
          const arr = JSON.parse(s);
          const found = (Array.isArray(arr) ? arr : []).filter(Boolean).find((x) => String(x.id) === String(id));
          if (!found) throw new Error();
          return found;
        });

      fetchNews().then((n) => {
        document.title = (n.seoTitle || n.title) + ' — k.veritas';
        const plain = (n.body || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 120);
        upsertMeta('meta[name="description"]', 'name', 'description', n.seoDescription || plain);
        upsertMeta('meta[property="og:title"]', 'property', 'og:title', n.seoTitle || n.title);
        upsertMeta('meta[property="og:description"]', 'property', 'og:description', n.seoDescription || plain);
        upsertMeta('meta[property="og:image"]', 'property', 'og:image', n.ogImage || (n.images && n.images[0]) || '');
        const imgs = n.images || [];
        const cover = imgs[0]
          ? `<img class="detail__cover" src="${esc(imgs[0])}" alt="${esc(n.title)} 대표 사진" title="클릭하면 크게 보기" decoding="async" fetchpriority="high" />`
          : '';
        const gallery = imgs.length > 1
          ? `<div class="detail__gallery" aria-label="공지 사진">${imgs.slice(1).map((u, i) =>
              `<img src="${esc(u)}" alt="${esc(n.title)} 사진 ${i + 2}" title="클릭하면 크게 보기" loading="lazy" decoding="async" />`
            ).join('')}</div>`
          : '';
        root.innerHTML = `
          ${n.isPopup ? '<div class="detail__tags"><span class="tag">팝업 공지</span></div>' : ''}
          <p class="detail__date">${fmt(n.createdAt)}</p>
          <h1 class="detail__title">${esc(n.title)}</h1>
          ${cover}
          <div class="detail__body">${renderBody(n.body)}</div>
          ${gallery}
          <div class="detail__actions">
            <a href="news.html" class="btn btn--ghost">목록으로</a>
          </div>`;
        if (window.DetailLightbox) window.DetailLightbox.bind(root);
      }).catch(() => { root.innerHTML = '<p class="empty-note">공지를 찾을 수 없습니다. <a href="news.html">목록으로</a></p>'; });
    })();
  </script>
</body>
</html>
