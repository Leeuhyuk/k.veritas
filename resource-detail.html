<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="k.veritas 자료실 — 카탈로그·사용설명서·인증서 등 다운로드 자료." />

  <meta property="og:image" content="https://leeuhyuk.github.io/k.veritas/images/test-hero.jpg" />

  <meta name="twitter:image" content="https://leeuhyuk.github.io/k.veritas/images/test-hero.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260720c" />
  <script>document.documentElement.classList.add("reveal-on");setTimeout(function(){window.__revealInit||document.documentElement.classList.add("reveal-off")},3000);</script>
</head>
<body class="site-hp">
  <div id="site-nav"></div>

  <main>
    <section class="page">
      <div class="detail" id="detail"><p class="empty-note">불러오는 중…</p></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="site-base.js?v=20260720a"></script>
  <script src="site.js?v=20260720c"></script>
  <script src="force-download.js"></script>
  <script src="sanitize-html.js"></script>
  <script src="detail-lightbox.js"></script>
  <script>
    (function () {
      const root = document.getElementById('detail');
      const esc = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
      const fmt = (iso) => { try { return new Date(iso).toLocaleDateString('ko-KR'); } catch (e) { return ''; } };
      const sizeStr = (b) => {
        if (!b) return '';
        const u = ['B', 'KB', 'MB', 'GB'];
        let i = 0, n = b;
        while (n >= 1024 && i < 3) { n /= 1024; i++; }
        return n.toFixed(n < 10 && i > 0 ? 1 : 0) + u[i];
      };
      const fileExt = (name) => {
        const m = String(name || '').match(/\.([a-z0-9]+)$/i);
        return m ? m[1].toUpperCase() : 'FILE';
      };
      const fileKind = (ext) => {
        const e = (ext || '').toLowerCase();
        if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'].includes(e)) return 'image';
        if (['pdf'].includes(e)) return 'pdf';
        if (['doc', 'docx', 'hwp', 'hwpx', 'txt', 'rtf'].includes(e)) return 'doc';
        if (['xls', 'xlsx', 'csv'].includes(e)) return 'sheet';
        if (['ppt', 'pptx'].includes(e)) return 'slide';
        if (['zip', 'rar', '7z'].includes(e)) return 'zip';
        if (['dwg', 'dxf', 'step', 'stp', 'iges', 'igs'].includes(e)) return 'cad';
        return 'file';
      };
      const stripTags = (s) => (s || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      const renderBody = (b) => {
        b = b || '';
        if (/<[a-z][\s\S]*>/i.test(b)) {
          return typeof sanitizeHtml === 'function' ? sanitizeHtml(b) : b;
        }
        return esc(b).split(/\n{2,}/).map((p) => `<p>${p.replace(/\n/g, '<br/>')}</p>`).join('');
      };
      const upsertMeta = (selector, attr, name, value) => {
        if (!value) return;
        let el = document.querySelector(selector);
        if (!el) { el = document.createElement('meta'); el.setAttribute(attr, name); document.head.appendChild(el); }
        el.setAttribute('content', value);
      };
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { root.innerHTML = '<p class="empty-note">잘못된 접근입니다.</p>'; return; }

      // Firebase(Firestore) 단일 소스 — 관리자 발행 인덱스(pages/resources-index)에서 조회
      const RES_INDEX = 'https://firestore.googleapis.com/v1/projects/production-management-e70fd/databases/(default)/documents/pages/resources-index';
      const fetchResource = () => fetch(RES_INDEX, { cache: 'no-store' })
        .then((r) => { if (!r.ok) throw new Error(); return r.json(); })
        .then((doc) => {
          const s = doc && doc.fields && doc.fields.json && doc.fields.json.stringValue;
          if (!s) throw new Error();
          const arr = JSON.parse(s);
          const found = (Array.isArray(arr) ? arr : []).filter(Boolean).find((x) => String(x.id) === String(id));
          if (!found) throw new Error();
          return found;
        });

      fetchResource()
        .then((r) => {
          const plain = stripTags(r.body).slice(0, 120);
          const desc = r.seoDescription || r.description || plain || r.originalName || '자료실 다운로드 자료입니다.';
          const detailBody = r.body ? renderBody(r.body) : (r.description ? `<p>${esc(r.description)}</p>` : '');
          document.title = `${r.seoTitle || r.title} — k.veritas`;
          upsertMeta('meta[name="description"]', 'name', 'description', desc);
          upsertMeta('meta[property="og:title"]', 'property', 'og:title', r.seoTitle || r.title);
          upsertMeta('meta[property="og:description"]', 'property', 'og:description', desc);
          upsertMeta('meta[property="og:image"]', 'property', 'og:image', r.ogImage || '');

          const fname = r.originalName || r.title || '첨부 파일';
          const ext = fileExt(fname);
          const kind = fileKind(ext);
          // GitHub Pages: /api/.../download 불가 → Storage 공개 URL 우선
          const fileUrl = r.file && /^https?:\/\//i.test(r.file) ? r.file : '';
          const downloadHref = fileUrl
            || ((window.withSiteBase
              ? window.withSiteBase('/api/resources/' + encodeURIComponent(r.id) + '/download')
              : '/api/resources/' + encodeURIComponent(r.id) + '/download'));
          // data-force-download: 크로스 오리진도 blob 저장 (미리보기/실행 방지)
          const dlAttrs =
            ` href="${esc(downloadHref)}" data-force-download="1" data-download-name="${esc(fname)}" download="${esc(fname)}"`;
          const sizeLabel = r.size ? sizeStr(r.size) : '';
          const dlCount = r.downloads || 0;

          root.innerHTML = `
            <div class="detail__tags">
              <span class="tag">${esc(r.category || '기타')}</span>
              ${r.isBrochure ? '<span class="tag">회사소개서</span>' : ''}
            </div>
            <p class="detail__date">${fmt(r.createdAt)}</p>
            <h1 class="detail__title">${esc(r.title)}</h1>

            <div class="resource-detail__box">
              <div class="resource-detail__main">
                <div class="resource-detail__icon resource-detail__icon--${kind}" aria-hidden="true">
                  <svg class="resource-detail__svg" width="40" height="48" viewBox="0 0 40 48" fill="none">
                    <path d="M8 2h16l10 10v30a4 4 0 01-4 4H8a4 4 0 01-4-4V6a4 4 0 014-4z" fill="currentColor" opacity="0.12"/>
                    <path d="M8 2h16l10 10v30a4 4 0 01-4 4H8a4 4 0 01-4-4V6a4 4 0 014-4z" stroke="currentColor" stroke-width="1.6"/>
                    <path d="M24 2v10h10" stroke="currentColor" stroke-width="1.6"/>
                  </svg>
                  <span class="resource-detail__ext">${esc(ext.length > 5 ? ext.slice(0, 4) : ext)}</span>
                </div>
                <div class="resource-detail__info">
                  <p class="resource-detail__label">첨부 파일</p>
                  <p class="resource-detail__filename" title="${esc(fname)}">${esc(fname)}</p>
                  <ul class="resource-detail__meta">
                    ${sizeLabel ? `<li><span class="resource-detail__chip">${esc(sizeLabel)}</span></li>` : ''}
                    <li><span class="resource-detail__chip">${esc(ext)} 파일</span></li>
                    <li><span class="resource-detail__chip">다운로드 ${dlCount}회</span></li>
                  </ul>
                </div>
              </div>
              <div class="resource-detail__actions">
                <a class="btn btn--primary resource-detail__download"${dlAttrs}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 4v10m0 0l-3.5-3.5M12 14l3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5 18h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                  다운로드
                </a>
                <p class="resource-detail__hint">클릭 시 파일 저장 창이 열립니다</p>
              </div>
            </div>

            ${detailBody
              ? `<div class="detail__body">${detailBody}</div>`
              : '<p class="empty-note" style="text-align:left;padding:var(--spacing-24) 0">등록된 상세 설명이 없습니다.</p>'}
            <div class="detail__actions">
              <a class="btn btn--primary"${dlAttrs}>다시 다운로드</a>
              <a href="reference.html" class="btn btn--ghost">목록으로</a>
              <a href="support.html#contact" class="btn btn--ghost">자료 문의</a>
            </div>`;
          // 본문에 넣은 사진 클릭 확대
          if (window.DetailLightbox) window.DetailLightbox.bind(root);
        })
        .catch(() => { root.innerHTML = '<p class="empty-note">자료를 찾을 수 없습니다. <a href="reference.html">목록으로</a></p>'; });
    })();
  </script>
</body>
</html>
