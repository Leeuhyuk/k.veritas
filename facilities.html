<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>생산설비 — k.veritas</title>
  <meta name="description" content="k.veritas 보유 생산설비 현황 — 5축 CNC, 머시닝 센터, CMM 등." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fragment+Mono&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="site-nav"></div>

  <main>
    <section class="subhero">
      <div class="subhero__inner">
        <p class="microlabel">FACILITIES</p>
        <h1 class="subhero__title" data-cms="hero_title" data-cms-label="상단 제목">생산설비</h1>
        <p class="subhero__sub" data-cms="hero_sub" data-cms-label="상단 설명">정밀 가공부터 측정까지, 일관 생산이 가능한 설비를 보유하고 있습니다.</p>
      </div>
    </section>

    <section class="page">
      <div class="section-head">
        <p class="microlabel">EQUIPMENT</p>
        <h2 class="section-title">보유 장비 현황</h2>
      </div>
      <table class="spec" style="max-width:820px;margin:0 auto">
        <thead><tr><th>설비</th><th>사양</th><th>보유 수량</th></tr></thead>
        <tbody>
          <tr><th>5축 CNC 머시닝</th><td>복합 형상 정밀 가공</td><td>4대</td></tr>
          <tr><th>머시닝 센터</th><td>3축 / 고속 가공</td><td>8대</td></tr>
          <tr><th>CNC 선반</th><td>원형 부품 가공</td><td>6대</td></tr>
          <tr><th>방전가공기(EDM)</th><td>금형 코어·캐비티</td><td>3대</td></tr>
          <tr><th>3차원 측정기(CMM)</th><td>치수·형상공차 측정</td><td>2대</td></tr>
          <tr><th>표면처리 라인</th><td>아노다이징·도금</td><td>1식</td></tr>
        </tbody>
      </table>
    </section>

    <section class="page" style="padding-top:0">
      <div class="features__grid">
        <article class="card"><span class="show-ph" style="display:block;text-align:center;padding:var(--spacing-48) 0">공장 전경</span></article>
        <article class="card"><span class="show-ph" style="display:block;text-align:center;padding:var(--spacing-48) 0">가공 라인</span></article>
        <article class="card"><span class="show-ph" style="display:block;text-align:center;padding:var(--spacing-48) 0">측정실</span></article>
      </div>
    </section>

    <section class="cta">
      <p class="microlabel">CONTACT</p>
      <h2 class="cta__title">설비 견학을 원하시나요?</h2>
      <p class="cta__sub">사전 예약 후 공장 견학이 가능합니다.</p>
      <div class="hero__actions">
        <a href="support.html#contact" class="btn btn--primary">견학 문의</a>
        <a href="location.html" class="btn btn--ghost">오시는 길</a>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="site-base.js"></script>
  <script src="site.js"></script>
  <script src="cms.js"></script>
</body>
</html>
