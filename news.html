<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 — k.veritas</title>
  <meta name="description" content="k.veritas 공지사항 및 소식." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260718f" />
  <script>document.documentElement.classList.add("reveal-on");setTimeout(function(){window.__revealInit||document.documentElement.classList.add("reveal-off")},3000);</script>
</head>
<body class="site-hp">
  <div id="site-nav"></div>

  <main>
    <section class="subhero subhero--bg" style="--subhero-bg:url('images/test-durability.jpg')">
      <div class="subhero__inner">
        <p class="microlabel">NEWS</p>
        <h1 class="subhero__title">공지사항</h1>
        <p class="subhero__sub">k.veritas의 새로운 소식과 공지를 전해 드립니다.</p>
      </div>
    </section>

    <section class="page">
      <div class="filter-chips" id="news-filter"></div>
      <div id="news-root" aria-live="polite">
        <div class="list-skeleton list-skeleton--list" aria-busy="true" aria-label="불러오는 중">
          <div class="list-skeleton__news"><span class="list-skeleton__bar list-skeleton__bar--sm"></span><span class="list-skeleton__bar list-skeleton__bar--lg"></span><span class="list-skeleton__bar list-skeleton__bar--md"></span></div>
          <div class="list-skeleton__news"><span class="list-skeleton__bar list-skeleton__bar--sm"></span><span class="list-skeleton__bar list-skeleton__bar--lg"></span><span class="list-skeleton__bar list-skeleton__bar--md"></span></div>
          <div class="list-skeleton__news"><span class="list-skeleton__bar list-skeleton__bar--sm"></span><span class="list-skeleton__bar list-skeleton__bar--lg"></span><span class="list-skeleton__bar list-skeleton__bar--md"></span></div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="site-base.js?v=20260718f"></script>
  <script src="site.js?v=20260718v"></script>
  <script>
  (function () {
    var root = document.getElementById('news-root');
    var filterBar = document.getElementById('news-filter');
    var all = [], cat = '';
    var esc = function (s) { return (s || '').replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); };
    var fmtDate = function (s) { var m = String(s || '').match(/^(\d{4})-(\d{2})-(\d{2})/); return m ? m[1] + '.' + m[2] + '.' + m[3] : ''; };
    var excerpt = function (n) { return n.summary || (n.body || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim(); };
    var arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    // Firebase(Firestore) 단일 소스 — 관리자 발행 인덱스(pages/news-index)만 읽음
    var NEWS_INDEX = 'https://firestore.googleapis.com/v1/projects/production-management-e70fd/databases/(default)/documents/pages/news-index';
    function load() {
      return fetch(NEWS_INDEX, { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (doc) {
          var s = doc && doc.fields && doc.fields.json && doc.fields.json.stringValue;
          var data = s ? JSON.parse(s) : [];
          var list = Array.isArray(data) ? data : (data.items || data.news || []);
          return list.filter(function (n) { return n && n.status !== 'draft' && n.status !== 'hidden'; })
            .sort(function (a, b) {
              var o = (a.order || 0) - (b.order || 0);
              if (o) return o;
              return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
            });
        });
    }

    function renderFilter() {
      var cats = [];
      all.forEach(function (n) { if (n.category && cats.indexOf(n.category) === -1) cats.push(n.category); });
      if (!cats.length) { filterBar.innerHTML = ''; return; }
      var html = '<button data-cat="" class="' + (cat === '' ? 'is-active' : '') + '">전체</button>';
      cats.forEach(function (c) { html += '<button data-cat="' + esc(c) + '" class="' + (cat === c ? 'is-active' : '') + '">' + esc(c) + '</button>'; });
      filterBar.innerHTML = html;
    }

    function render() {
      var list = cat ? all.filter(function (n) { return n.category === cat; }) : all;
      if (!list.length) { root.innerHTML = '<p class="empty-note">등록된 공지가 없습니다.</p>'; return; }
      root.innerHTML = '<div class="news-list">' + list.map(function (n) {
        return '<a class="news-item" href="news-detail.html?id=' + encodeURIComponent(n.id) + '">' +
          '<span class="news-item__meta">' +
            '<span class="news-item__date">' + fmtDate(n.createdAt) + '</span>' +
            (n.category ? '<span class="tag">' + esc(n.category) + '</span>' : '') +
          '</span>' +
          '<span class="news-item__b"><h3>' + esc(n.title || '(제목 없음)') + '</h3><p>' + esc(excerpt(n)) + '</p></span>' +
          '<span class="news-item__go">' + arrow + '</span>' +
        '</a>';
      }).join('') + '</div>';
    }

    filterBar.addEventListener('click', function (e) {
      var b = e.target.closest('button[data-cat]'); if (!b) return;
      cat = b.getAttribute('data-cat') || '';
      Array.prototype.forEach.call(filterBar.querySelectorAll('button'), function (x) { x.classList.remove('is-active'); });
      b.classList.add('is-active');
      render();
    });

    load().then(function (list) { all = list; renderFilter(); render(); })
      .catch(function () { filterBar.innerHTML = ''; root.innerHTML = '<p class="empty-note">공지를 불러오지 못했습니다.</p>'; });
  })();
  </script>
</body>
</html>
