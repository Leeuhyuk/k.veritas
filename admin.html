<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — k.veritas</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fragment+Mono&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260718c" />
</head>
<body>
  <div id="site-nav"></div>

  <main>
    <section class="subhero">
      <div class="subhero__inner">
        <p class="microlabel">ADMIN</p>
        <h1 class="subhero__title">제품 관리</h1>
        <p class="subhero__sub">실제 생산 제품을 사진과 함께 등록·수정합니다. 블로그 글 쓰듯 작성하면 제품 페이지에 바로 게시됩니다.</p>
      </div>
    </section>

    <!-- 로그인 -->
    <section class="page" id="login-view" style="display:none">
      <div class="admin-login">
        <div class="section-head" style="margin-bottom:var(--spacing-32)">
          <p class="microlabel">LOGIN</p>
          <h2 class="section-title" style="font-size:34px;letter-spacing:-1.2px">관리자 로그인</h2>
        </div>
        <form class="form" id="login-form">
          <div class="form__row">
            <label for="password">비밀번호</label>
            <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn--primary form__submit">로그인</button>
          <p class="admin__msg" id="login-msg"></p>
        </form>
      </div>
    </section>

    <!-- 편집기 -->
    <section class="page" id="editor-view" style="display:none">
      <div class="admin admin--split">
        <nav class="admin-tabs">
          <a href="admin.html" class="is-active">제품</a>
          <a href="admin-news.html">공지사항</a>
          <a href="admin-resources.html">자료실</a>
          <a href="admin-inquiries.html">문의 내역</a>
          <a href="admin-pages.html">페이지 편집</a>
          <a href="admin-settings.html">관리자</a>
        </nav>
        <div class="admin__bar">
          <h2 class="section-title" style="text-align:left;font-size:28px;letter-spacing:-1px" id="editor-title">새 제품 등록</h2>
          <button class="btn btn--ghost btn--sm" id="logout-btn">로그아웃</button>
        </div>

        <form class="form" id="product-form">
          <input type="hidden" id="edit-id" />
          <div class="form__grid">
            <div class="form__row">
              <label for="title">제품명 *</label>
              <input id="title" type="text" placeholder="예: 정밀 가공 브라켓" required />
            </div>
            <div class="form__row">
              <label for="category">카테고리</label>
              <select id="category"><option value="">(선택 안 함)</option></select>
            </div>
          </div>
          <div class="form__grid">
            <div class="form__row">
              <label for="status">공개 상태</label>
              <select id="status">
                <option value="published">게시</option>
                <option value="draft">비공개</option>
              </select>
            </div>
            <div class="form__row">
              <label for="industry">산업군</label>
              <input id="industry" type="text" placeholder="예: 자동차, 반도체, 의료기기" />
            </div>
          </div>
          <div class="form__grid">
            <div class="form__row">
              <label for="material">소재</label>
              <input id="material" type="text" placeholder="예: AL6061, SUS316L" />
            </div>
            <div class="form__row">
              <label for="process">공정</label>
              <input id="process" type="text" placeholder="예: 5축 CNC, CMM 검사" />
            </div>
          </div>
          <div class="form__row">
            <label for="summary">한 줄 요약</label>
            <input id="summary" type="text" placeholder="목록 카드에 표시될 짧은 소개" />
          </div>
          <div class="form__grid">
            <div class="form__row">
              <label for="seoTitle">SEO 제목</label>
              <input id="seoTitle" type="text" placeholder="비워두면 제품명 사용" />
            </div>
            <div class="form__row">
              <label for="ogImage">OG 이미지 URL</label>
              <input id="ogImage" type="text" placeholder="비워두면 대표 이미지 사용" />
            </div>
          </div>
          <div class="form__row">
            <label for="seoDescription">SEO 설명</label>
            <input id="seoDescription" type="text" placeholder="검색 결과와 공유 미리보기에 표시될 설명" />
          </div>
          <div class="form__row">
            <label for="body">소개 내용</label>
            <div class="rte-toolbar" id="rte-toolbar">
              <select class="rte-btn" id="rte-font" title="글꼴">
                <option value="">글꼴</option>
                <option value="'Noto Sans KR',sans-serif">고딕</option>
                <option value="'Nanum Myeongjo',serif">명조</option>
                <option value="Inter,sans-serif">Inter</option>
                <option value="'Fragment Mono',monospace">모노</option>
              </select>
              <select class="rte-btn" id="rte-size" title="글자 크기">
                <option value="">크기</option>
                <option value="13">13</option>
                <option value="15">15</option>
                <option value="18">18</option>
                <option value="24">24</option>
                <option value="32">32</option>
              </select>
              <span class="rte-sep"></span>
              <button type="button" class="rte-btn" data-cmd="bold" title="굵게"><b>B</b></button>
              <button type="button" class="rte-btn" data-cmd="italic" title="기울임"><i>I</i></button>
              <button type="button" class="rte-btn" data-cmd="underline" title="밑줄"><u>U</u></button>
              <button type="button" class="rte-btn" data-cmd="strikeThrough" title="취소선"><s>S</s></button>
              <label class="rte-color" title="글자색">글자색<input type="color" id="rte-color" value="#0a1d08" /></label>
              <label class="rte-color" title="형광펜">형광펜<input type="color" id="rte-hl" value="#d7e8b5" /></label>
              <span class="rte-sep"></span>
              <button type="button" class="rte-btn" data-block="h2" title="제목">제목</button>
              <button type="button" class="rte-btn" data-block="h3" title="소제목">소제목</button>
              <button type="button" class="rte-btn" data-block="p" title="본문">본문</button>
              <button type="button" class="rte-btn" data-block="blockquote" title="인용구">인용구</button>
              <span class="rte-sep"></span>
              <button type="button" class="rte-btn" data-cmd="justifyLeft" title="왼쪽 정렬">왼쪽</button>
              <button type="button" class="rte-btn" data-cmd="justifyCenter" title="가운데 정렬">가운데</button>
              <button type="button" class="rte-btn" data-cmd="justifyRight" title="오른쪽 정렬">오른쪽</button>
              <button type="button" class="rte-btn" data-cmd="insertUnorderedList" title="글머리 기호">• 목록</button>
              <button type="button" class="rte-btn" data-cmd="insertOrderedList" title="번호 매기기">1. 목록</button>
              <span class="rte-sep"></span>
              <button type="button" class="rte-btn" id="rte-link" title="링크">링크</button>
              <button type="button" class="rte-btn" id="rte-hr" title="구분선">구분선</button>
              <button type="button" class="rte-btn" id="rte-table" title="표 삽입">표</button>
              <button type="button" class="rte-btn" id="rte-img" title="이미지 삽입">이미지</button>
            </div>
            <div class="rte-toolbar tt-toolbar" id="table-toolbar">
              <span class="tt-label">표 편집</span>
              <button type="button" class="rte-btn" data-tt="row-add" title="행 추가">행+</button>
              <button type="button" class="rte-btn" data-tt="row-del" title="행 삭제">행−</button>
              <button type="button" class="rte-btn" data-tt="col-add" title="열 추가">열+</button>
              <button type="button" class="rte-btn" data-tt="col-del" title="열 삭제">열−</button>
              <button type="button" class="rte-btn" data-tt="merge-right" title="오른쪽 셀과 병합">→ 병합</button>
              <button type="button" class="rte-btn" data-tt="merge-down" title="아래 셀과 병합">↓ 병합</button>
              <button type="button" class="rte-btn" data-tt="unmerge" title="병합 해제">병합 해제</button>
              <span class="tt-hint">폭·높이는 표 안 셀의 오른쪽/아래 경계를 드래그</span>
              <span class="tt-msg admin__msg"></span>
            </div>
            <div class="rte-editor" id="body" contenteditable="true" data-placeholder="제품 소개를 자유롭게 작성하세요. 글자 스타일과 표를 넣을 수 있습니다."></div>
          </div>
          <div class="form__row">
            <label for="images">사진 첨부 (여러 장 가능 · 첫 장이 대표 이미지)</label>
            <input id="images" type="file" accept="image/*" multiple />
          </div>
          <div class="form__row" id="kept-row" style="display:none">
            <label>기존 사진</label>
            <div class="img-chips" id="kept-chips"></div>
          </div>
          <div style="display:flex;gap:var(--spacing-16);align-items:center;flex-wrap:wrap">
            <button type="submit" class="btn btn--primary form__submit" id="save-btn">등록하기</button>
            <button type="button" class="btn btn--ghost" id="preview-btn">미리보기</button>
            <button type="button" class="btn btn--ghost" id="cancel-btn" style="display:none">취소</button>
            <span class="admin__msg" id="form-msg"></span>
          </div>
        </form>

        <div class="preview-modal" id="preview-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="preview-title">
          <div class="preview-modal__panel">
            <div class="admin__bar">
              <h2 class="section-title" id="preview-title" style="text-align:left;font-size:28px;letter-spacing:-1px">제품 미리보기</h2>
              <button type="button" class="btn btn--ghost btn--sm" id="preview-close">닫기</button>
            </div>
            <div class="detail" id="preview-body"></div>
          </div>
        </div>

        <div class="admin__cats">
          <p class="microlabel" style="margin-bottom:var(--spacing-16)">카테고리 관리</p>
          <div style="display:flex;gap:var(--spacing-8);flex-wrap:wrap">
            <input id="cat-input" type="text" placeholder="새 카테고리 입력" style="flex:1;min-width:180px" />
            <button type="button" id="cat-add" class="btn btn--ghost">추가</button>
          </div>
          <div id="cat-chips" class="img-chips" style="margin-top:var(--spacing-16)"></div>
          <span class="admin__msg" id="cat-msg"></span>
        </div>

        <div class="admin__list">
          <p class="microlabel" style="margin-bottom:var(--spacing-16)">등록된 제품 <span id="admin-list-count"></span></p>
          <div id="admin-list"></div>
          <div id="admin-pager" class="admin-pager"></div>
        </div>

      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="site.js?v=20260718c"></script>
  <script src="table-editor.js"></script>
  <script src="rte-image.js"></script>
  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const esc = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
      let keptImages = []; // 수정 시 유지할 기존 이미지
      let categories = []; // 관리 중인 카테고리 목록
      const PRODUCT_PAGE_SIZE = 10;
      let productItems = [];
      let productPage = 1;

      /* ---------- 상태 전환 ---------- */
      function showLogin() { $('login-view').style.display = 'block'; $('editor-view').style.display = 'none'; }
      function showEditor() { $('login-view').style.display = 'none'; $('editor-view').style.display = 'block'; loadCategories(); loadList(); }

      /* ---------- 카테고리 ---------- */
      function fillCategorySelect(selected) {
        const sel = $('category');
        const cur = selected !== undefined ? selected : sel.value;
        let html = '<option value="">(선택 안 함)</option>' +
          categories.map((c) => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
        if (cur && !categories.includes(cur)) html += `<option value="${esc(cur)}">${esc(cur)} (목록 외)</option>`;
        sel.innerHTML = html;
        sel.value = cur || '';
      }
      function renderCatChips() {
        $('cat-chips').innerHTML = categories.length
          ? categories.map((c) => `<span class="cat-chip">${esc(c)}<button type="button" data-cat="${esc(c)}" aria-label="삭제">×</button></span>`).join('')
          : '<span class="admin__msg">등록된 카테고리가 없습니다.</span>';
      }
      function loadCategories(selected) {
        return fetch('/api/categories').then((r) => r.json()).then((cats) => {
          categories = cats;
          fillCategorySelect(selected);
          renderCatChips();
        });
      }
      function bindCategoryUI() {
        $('cat-add').addEventListener('click', () => {
          const name = $('cat-input').value.trim();
          if (!name) return;
          fetch('/api/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
          }).then(async (r) => {
            const d = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(d.message || '추가에 실패했습니다.');
            return d;
          }).then((cats) => {
            categories = cats; $('cat-input').value = '';
            fillCategorySelect(); renderCatChips();
            $('cat-msg').textContent = '추가되었습니다.';
            setTimeout(() => ($('cat-msg').textContent = ''), 2000);
          }).catch((e) => { $('cat-msg').textContent = e.message; });
        });
        $('cat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); $('cat-add').click(); } });
        $('cat-chips').addEventListener('click', (e) => {
          const b = e.target.closest('button'); if (!b) return;
          const name = b.dataset.cat;
          if (!confirm(`카테고리 "${name}"을(를) 삭제할까요?\n(이미 이 카테고리로 등록된 제품의 값은 그대로 유지됩니다)`)) return;
          fetch('/api/categories/' + encodeURIComponent(name), { method: 'DELETE' })
            .then((r) => r.json()).then((cats) => { categories = cats; fillCategorySelect(); renderCatChips(); });
        });
      }
      bindCategoryUI();

      /* ---------- 리치 텍스트 편집기 (소개 내용) — 블로그형 툴바 ---------- */
      function bindRTE() {
        const editor = $('body');
        try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
        let saved = null;
        const save = () => { const s = window.getSelection(); if (s.rangeCount && editor.contains(s.anchorNode)) saved = s.getRangeAt(0); };
        ['keyup', 'mouseup', 'focus'].forEach((ev) => editor.addEventListener(ev, save));
        const restore = () => { editor.focus(); if (saved) { const s = window.getSelection(); s.removeAllRanges(); s.addRange(saved); } };
        const exec = (cmd, val) => { restore(); document.execCommand(cmd, false, val || null); save(); };

        // 굵게/기울임/정렬/목록/취소선 등
        document.querySelectorAll('#rte-toolbar button[data-cmd]').forEach((btn) => {
          btn.addEventListener('mousedown', (e) => { e.preventDefault(); exec(btn.dataset.cmd); });
        });
        // 문단 스타일 (제목/소제목/본문/인용구)
        document.querySelectorAll('#rte-toolbar button[data-block]').forEach((btn) => {
          btn.addEventListener('mousedown', (e) => { e.preventDefault(); exec('formatBlock', '<' + btn.dataset.block + '>'); });
        });
        // 글꼴
        $('rte-font').addEventListener('change', (e) => { const v = e.target.value; e.target.selectedIndex = 0; if (v) exec('fontName', v); });
        // 글자 크기 (px)
        $('rte-size').addEventListener('change', (e) => {
          const px = e.target.value; e.target.selectedIndex = 0; if (!px) return;
          restore();
          document.execCommand('fontSize', false, '7');
          editor.querySelectorAll('font[size="7"]').forEach((f) => { f.removeAttribute('size'); f.style.fontSize = px + 'px'; });
          save();
        });
        // 글자색 / 형광펜
        $('rte-color').addEventListener('input', (e) => exec('foreColor', e.target.value));
        $('rte-hl').addEventListener('input', (e) => exec('hiliteColor', e.target.value));
        // 링크
        $('rte-link').addEventListener('mousedown', (e) => {
          e.preventDefault();
          const url = prompt('링크 주소(URL)를 입력하세요', 'https://');
          if (url) exec('createLink', url);
        });
        // 구분선
        $('rte-hr').addEventListener('mousedown', (e) => { e.preventDefault(); exec('insertHorizontalRule'); });
        // 표 삽입
        $('rte-table').addEventListener('mousedown', (e) => {
          e.preventDefault();
          const rows = parseInt(prompt('표 행(가로줄) 수 — 첫 줄은 제목 행입니다', '3'), 10);
          if (!rows || rows < 1) return;
          const cols = parseInt(prompt('표 열(세로칸) 수', '3'), 10);
          if (!cols || cols < 1) return;
          let html = '<table><thead><tr>';
          for (let c = 0; c < cols; c++) html += '<th>제목' + (c + 1) + '</th>';
          html += '</tr></thead><tbody>';
          for (let r = 0; r < rows - 1; r++) {
            html += '<tr>';
            for (let c = 0; c < cols; c++) html += '<td>내용</td>';
            html += '</tr>';
          }
          html += '</tbody></table><p><br></p>';
          restore();
          document.execCommand('insertHTML', false, html);
          save();
        });
      }
      bindRTE();
      if (window.initTableEditor) initTableEditor($('body'), $('table-toolbar'));
      if (window.bindImageInsert) bindImageInsert($('body'), $('rte-img'));

      fetch('/api/admin/me').then((r) => r.json()).then((d) => (d.admin ? showEditor() : showLogin())).catch(showLogin);

      /* ---------- 로그인 ---------- */
      $('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        $('login-msg').textContent = '';
        fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: $('password').value }),
        }).then((r) => {
          if (r.ok) { $('password').value = ''; showEditor(); }
          else $('login-msg').textContent = '비밀번호가 올바르지 않습니다.';
        });
      });

      $('logout-btn').addEventListener('click', () => {
        fetch('/api/admin/logout', { method: 'POST' }).then(showLogin);
      });

      /* ---------- 목록 ---------- */
      function productTotalPages() {
        return Math.max(1, Math.ceil(productItems.length / PRODUCT_PAGE_SIZE));
      }
      function persistProductOrder() {
        return fetch('/api/products/order', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids: productItems.map((p) => p.id) }),
        }).then((r) => { if (!r.ok) throw new Error(); return r.json(); })
          .then((items) => {
            productItems = items;
            renderList();
            return items;
          });
      }
      function renderPager() {
        const pager = $('admin-pager');
        const count = $('admin-list-count');
        if (!productItems.length) {
          pager.innerHTML = '';
          count.textContent = '';
          return;
        }
        const pages = productTotalPages();
        const start = (productPage - 1) * PRODUCT_PAGE_SIZE + 1;
        const end = Math.min(productPage * PRODUCT_PAGE_SIZE, productItems.length);
        count.textContent = `(${productItems.length}개 · ${start}-${end})`;
        if (pages <= 1) {
          pager.innerHTML = '';
          return;
        }
        let buttons = `<button type="button" class="btn btn--ghost btn--sm" data-page="${productPage - 1}" ${productPage === 1 ? 'disabled' : ''}>이전</button>`;
        for (let i = 1; i <= pages; i++) {
          buttons += `<button type="button" class="btn btn--ghost btn--sm ${i === productPage ? 'is-active' : ''}" data-page="${i}" ${i === productPage ? 'aria-current="page"' : ''}>${i}</button>`;
        }
        buttons += `<button type="button" class="btn btn--ghost btn--sm" data-page="${productPage + 1}" ${productPage === pages ? 'disabled' : ''}>다음</button>`;
        pager.innerHTML = `<span class="admin-pager__info">${productPage} / ${pages} 페이지</span>${buttons}`;
      }
      function renderList() {
        productPage = Math.min(Math.max(productPage, 1), productTotalPages());
        if (!productItems.length) {
          $('admin-list').innerHTML = '<p class="empty-note" style="padding:var(--spacing-32) 0">아직 등록된 제품이 없습니다.</p>';
          renderPager();
          return;
        }
        const start = (productPage - 1) * PRODUCT_PAGE_SIZE;
        const items = productItems.slice(start, start + PRODUCT_PAGE_SIZE);
        $('admin-list').innerHTML = items.map((p) => {
          const thumb = p.images && p.images[0]
            ? `<img src="${esc(p.images[0])}" alt="" />`
            : `<div class="ph"></div>`;
          const detail = [p.category || '미분류', [p.industry, p.material, p.process].filter(Boolean).join(' / ')].filter(Boolean).join(' · ');
          return `<div class="admin__row" draggable="true" data-id="${esc(p.id)}">
            <span class="drag-handle" title="드래그하여 순서 변경" aria-hidden="true">⠿</span>
            ${thumb}
            <div class="admin__row-main">
              <strong>${esc(p.title)}</strong>
              <span>${p.status === 'draft' ? '비공개' : '게시'} · ${esc(detail)} · 이미지 ${p.images ? p.images.length : 0}장</span>
            </div>
            <button class="btn btn--ghost btn--sm act-up" title="위로">▲</button>
            <button class="btn btn--ghost btn--sm act-down" title="아래로">▼</button>
            <button class="btn btn--ghost btn--sm act-edit">수정</button>
            <button class="btn btn--ghost btn--sm act-del">삭제</button>
          </div>`;
        }).join('');
        renderPager();
      }
      function loadList() {
        fetch('/api/admin/products').then((r) => r.json()).then((items) => {
          productItems = Array.isArray(items) ? items : [];
          renderList();
        });
      }
      $('admin-pager').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-page]');
        if (!btn || btn.disabled) return;
        productPage = Number(btn.dataset.page);
        renderList();
      });

      /* ---------- 등록/수정 ---------- */
      function resetForm() {
        $('product-form').reset();
        $('edit-id').value = '';
        $('body').innerHTML = '';
        fillCategorySelect('');
        keptImages = [];
        renderKept();
        $('editor-title').textContent = '새 제품 등록';
        $('save-btn').textContent = '등록하기';
        $('cancel-btn').style.display = 'none';
        $('form-msg').textContent = '';
      }

      function renderKept() {
        const row = $('kept-row');
        if (!keptImages.length) { row.style.display = 'none'; $('kept-chips').innerHTML = ''; return; }
        row.style.display = 'grid';
        $('kept-chips').innerHTML = keptImages.map((u, i) =>
          `<div class="img-chip"><img src="${esc(u)}" alt="" /><button type="button" data-i="${i}" aria-label="삭제">×</button></div>`
        ).join('');
      }
      $('kept-chips').addEventListener('click', (e) => {
        const b = e.target.closest('button');
        if (!b) return;
        keptImages.splice(Number(b.dataset.i), 1);
        renderKept();
      });

      $('cancel-btn').addEventListener('click', resetForm);
      function renderPreview() {
        const title = $('title').value.trim() || '제품명 미입력';
        const tags = [$('category').value, $('industry').value, $('material').value, $('process').value].filter(Boolean);
        const body = $('body').innerHTML.trim() || '<p class="empty-note" style="text-align:left">소개 내용이 없습니다.</p>';
        const cover = keptImages[0]
          ? `<img class="detail__cover" src="${esc(keptImages[0])}" alt="${esc(title)}" />`
          : `<div class="detail__cover is-ph"><span class="show-ph">NO IMAGE</span></div>`;
        $('preview-body').innerHTML = `
          <div style="display:flex;gap:var(--spacing-8);flex-wrap:wrap;margin-bottom:var(--spacing-16)">
            ${tags.map((t) => `<span class="tag">${esc(t)}</span>`).join('')}
            <span class="tag" style="background:${$('status').value === 'draft' ? 'var(--color-lichen)' : 'var(--color-moss-veil)'}">${$('status').value === 'draft' ? '비공개' : '게시'}</span>
          </div>
          <h1 class="section-title" style="text-align:left;margin-bottom:var(--spacing-32)">${esc(title)}</h1>
          ${cover}
          <div class="detail__body">${body}</div>`;
        $('preview-modal').style.display = 'block';
      }
      $('preview-btn').addEventListener('click', renderPreview);
      $('preview-close').addEventListener('click', () => { $('preview-modal').style.display = 'none'; });
      $('preview-modal').addEventListener('click', (e) => { if (e.target.id === 'preview-modal') $('preview-modal').style.display = 'none'; });

      $('product-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const id = $('edit-id').value;
        const fd = new FormData();
        fd.append('title', $('title').value);
        fd.append('category', $('category').value);
        fd.append('status', $('status').value);
        fd.append('industry', $('industry').value);
        fd.append('material', $('material').value);
        fd.append('process', $('process').value);
        fd.append('summary', $('summary').value);
        fd.append('body', $('body').innerHTML.trim());
        fd.append('seoTitle', $('seoTitle').value);
        fd.append('seoDescription', $('seoDescription').value);
        fd.append('ogImage', $('ogImage').value);
        const files = $('images').files;
        for (let i = 0; i < files.length; i++) fd.append('images', files[i]);
        if (id) fd.append('keepImages', JSON.stringify(keptImages));

        $('form-msg').textContent = '저장 중…';
        fetch(id ? '/api/products/' + encodeURIComponent(id) : '/api/products', {
          method: id ? 'PUT' : 'POST',
          body: fd,
        }).then(async (r) => {
          const data = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(data.message || '저장에 실패했습니다.');
          return data;
        }).then(() => {
          if (!id) productPage = 1;
          resetForm();
          $('form-msg').textContent = '저장되었습니다.';
          loadList();
          setTimeout(() => ($('form-msg').textContent = ''), 2500);
        }).catch((err) => { $('form-msg').textContent = err.message || '저장에 실패했습니다.'; });
      });

      /* ---------- 행 액션 (수정/삭제) ---------- */
      $('admin-list').addEventListener('click', (e) => {
        const row = e.target.closest('.admin__row');
        if (!row) return;
        const id = row.dataset.id;
        if (e.target.classList.contains('act-up') || e.target.classList.contains('act-down')) {
          const i = productItems.findIndex((p) => p.id === id);
          const j = e.target.classList.contains('act-up') ? i - 1 : i + 1;
          if (j < 0 || j >= productItems.length) return;
          [productItems[i], productItems[j]] = [productItems[j], productItems[i]];
          persistProductOrder()
            .catch(() => alert('순서 변경에 실패했습니다.'));
        } else if (e.target.classList.contains('act-del')) {
          if (!confirm('이 제품을 삭제할까요?')) return;
          fetch('/api/products/' + encodeURIComponent(id), { method: 'DELETE' }).then(loadList);
        } else if (e.target.classList.contains('act-edit')) {
          fetch('/api/admin/products/' + encodeURIComponent(id)).then((r) => r.json()).then((p) => {
            $('edit-id').value = p.id;
            $('title').value = p.title || '';
            fillCategorySelect(p.category || '');
            $('status').value = p.status === 'draft' ? 'draft' : 'published';
            $('industry').value = p.industry || '';
            $('material').value = p.material || '';
            $('process').value = p.process || '';
            $('summary').value = p.summary || '';
            $('body').innerHTML = p.body || '';
            $('seoTitle').value = p.seoTitle || '';
            $('seoDescription').value = p.seoDescription || '';
            $('ogImage').value = p.ogImage || '';
            $('images').value = '';
            keptImages = (p.images || []).slice();
            renderKept();
            $('editor-title').textContent = '제품 수정';
            $('save-btn').textContent = '수정 저장';
            $('cancel-btn').style.display = 'inline-flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        }
      });

      /* ---------- 드래그앤드롭 순서 변경 ---------- */
      function saveOrder() {
        const ids = Array.from($('admin-list').querySelectorAll('.admin__row')).map((r) => r.dataset.id);
        const byId = new Map(productItems.map((p) => [p.id, p]));
        const start = (productPage - 1) * PRODUCT_PAGE_SIZE;
        const orderedPage = ids.map((id) => byId.get(id)).filter(Boolean);
        productItems.splice(start, orderedPage.length, ...orderedPage);
        return persistProductOrder();
      }
      function dragAfter(container, y) {
        const els = Array.from(container.querySelectorAll('.admin__row:not(.dragging)'));
        let best = { offset: -Infinity, el: null };
        els.forEach((child) => {
          const box = child.getBoundingClientRect();
          const offset = y - box.top - box.height / 2;
          if (offset < 0 && offset > best.offset) best = { offset, el: child };
        });
        return best.el;
      }
      const listEl = $('admin-list');
      listEl.addEventListener('dragstart', (e) => {
        const row = e.target.closest('.admin__row');
        if (!row) return;
        row.classList.add('dragging');
        if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
      });
      listEl.addEventListener('dragover', (e) => {
        if (!listEl.querySelector('.dragging')) return;
        e.preventDefault();
        const dragging = listEl.querySelector('.dragging');
        const after = dragAfter(listEl, e.clientY);
        if (after == null) listEl.appendChild(dragging);
        else listEl.insertBefore(dragging, after);
      });
      listEl.addEventListener('drop', (e) => e.preventDefault());
      listEl.addEventListener('dragend', () => {
        const dragging = listEl.querySelector('.dragging');
        if (dragging) dragging.classList.remove('dragging');
        saveOrder().then(() => loadList()).catch(() => { alert('순서 저장에 실패했습니다.'); loadList(); });
      });
    })();
  </script>
</body>
</html>
