<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자료실 관리 — k.veritas</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fragment+Mono&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260720c" />
</head>
<body>
  <div id="site-nav"></div>

  <main>
    <section class="subhero">
      <div class="subhero__inner">
        <p class="microlabel">ADMIN</p>
        <h1 class="subhero__title">자료실 관리</h1>
        <p class="subhero__sub">카탈로그·설명서·인증서 등 자료를 올리면 자료실 페이지에 바로 게시됩니다.</p>
      </div>
    </section>

    <section class="page" id="login-view" style="display:none">
      <div class="admin-login">
        <div class="section-head" style="margin-bottom:var(--spacing-32)">
          <p class="microlabel">LOGIN</p>
          <h2 class="section-title" style="font-size:34px;letter-spacing:-1.2px">관리자 로그인</h2>
        </div>
        <form class="form" id="login-form">
          <div class="form__row">
            <label for="password">비밀번호</label>
            <input id="password" type="password" autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn--primary form__submit">로그인</button>
          <p class="admin__msg" id="login-msg"></p>
        </form>
      </div>
    </section>

    <section class="page" id="editor-view" style="display:none">
      <div class="admin admin--split">
        <nav class="admin-tabs">
          <a href="admin.html">제품</a>
          <a href="admin-news.html">공지사항</a>
          <a href="admin-resources.html" class="is-active">자료실</a>
          <a href="admin-inquiries.html">문의 내역</a>
          <a href="admin-pages.html">페이지 편집</a>
          <a href="admin-settings.html">관리자</a>
        </nav>
        <div class="admin__bar">
          <h2 class="section-title" style="text-align:left;font-size:28px;letter-spacing:-1px" id="editor-title">새 자료 등록</h2>
          <button class="btn btn--ghost btn--sm" id="logout-btn">로그아웃</button>
        </div>

        <form class="form" id="res-form">
          <input type="hidden" id="edit-id" />
          <div class="form__grid">
            <div class="form__row">
              <label for="title">제목 *</label>
              <input id="title" type="text" placeholder="예: 정밀 가공 부품 카탈로그 2026" required />
            </div>
            <div class="form__row">
              <label for="category">분류</label>
              <div style="display:flex;gap:8px;align-items:center">
                <select id="category" style="flex:1">
                  <option>카탈로그</option>
                  <option>사용설명서</option>
                  <option>인증서</option>
                  <option>도면(CAD)</option>
                  <option>시험성적서</option>
                  <option>기타</option>
                </select>
                <button type="button" class="btn btn--ghost btn--sm" id="add-cat-btn">＋ 새 분류</button>
              </div>
            </div>
          </div>
          <div class="form__grid">
            <div class="form__row">
              <label for="status">공개 상태</label>
              <select id="status">
                <option value="published">게시</option>
                <option value="draft">비공개</option>
              </select>
            </div>
            <label style="display:flex;align-items:center;gap:8px;font-family:var(--font-akkurat);font-size:var(--text-body-sm);letter-spacing:-0.04em;text-transform:none;color:var(--color-bark-brown);padding-top:26px">
              <input id="isBrochure" type="checkbox" style="width:auto" />
              <span>회사소개서 받기 버튼에 연결</span>
            </label>
          </div>
          <div class="form__row">
            <label for="description">설명 (선택)</label>
            <input id="description" type="text" placeholder="목록에 함께 표시될 짧은 설명" />
          </div>
          <div class="form__grid">
            <div class="form__row">
              <label for="seoTitle">SEO 제목</label>
              <input id="seoTitle" type="text" placeholder="비워두면 자료 제목 사용" />
            </div>
            <div class="form__row">
              <label for="ogImage">OG 이미지 URL</label>
              <input id="ogImage" type="text" placeholder="공유 미리보기에 사용할 이미지 URL" />
            </div>
          </div>
          <div class="form__row">
            <label for="seoDescription">SEO 설명</label>
            <input id="seoDescription" type="text" placeholder="검색 결과와 공유 미리보기에 표시될 설명" />
          </div>
          <div class="form__row">
            <label for="body">상세 내용</label>
            <div class="rte-toolbar" id="rte-toolbar">
              <button type="button" class="rte-btn" data-cmd="bold"><b>B</b></button>
              <button type="button" class="rte-btn" data-cmd="italic"><i>I</i></button>
              <button type="button" class="rte-btn" data-cmd="underline"><u>U</u></button>
              <button type="button" class="rte-btn" data-block="h2">제목</button>
              <button type="button" class="rte-btn" data-block="h3">소제목</button>
              <button type="button" class="rte-btn" data-block="p">본문</button>
              <button type="button" class="rte-btn" id="rte-table">표 삽입</button>
              <button type="button" class="rte-btn" id="rte-img">이미지</button>
            </div>
            <div class="rte-toolbar tt-toolbar" id="table-toolbar">
              <span class="tt-label">표 편집</span>
              <button type="button" class="rte-btn" data-tt="row-add">행+</button>
              <button type="button" class="rte-btn" data-tt="row-del">행-</button>
              <button type="button" class="rte-btn" data-tt="col-add">열+</button>
              <button type="button" class="rte-btn" data-tt="col-del">열-</button>
              <button type="button" class="rte-btn" data-tt="merge-right">우 병합</button>
              <button type="button" class="rte-btn" data-tt="merge-down">하 병합</button>
              <button type="button" class="rte-btn" data-tt="unmerge">병합 해제</button>
              <span class="tt-hint">셀 너비는 표 경계를 드래그</span>
              <span class="tt-msg admin__msg"></span>
            </div>
            <div class="rte-editor" id="body" contenteditable="true" data-placeholder="자료 상세페이지에 표시될 내용을 작성하세요."></div>
          </div>
          <div class="form__row">
            <label for="file">첨부 파일 <span id="file-hint" style="font-family:var(--font-fragment-mono);font-size:12px;color:var(--color-bark-brown)"></span></label>
            <input id="file" type="file" />
          </div>
          <div style="display:flex;gap:var(--spacing-16);align-items:center;flex-wrap:wrap">
            <button type="submit" class="btn btn--primary form__submit" id="save-btn">등록하기</button>
            <button type="button" class="btn btn--ghost" id="cancel-btn" style="display:none">취소</button>
            <span class="admin__msg" id="form-msg"></span>
          </div>
        </form>

        <div class="admin__list">
          <p class="microlabel" style="margin-bottom:var(--spacing-16)">등록된 자료</p>
          <div id="admin-list"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="site.js?v=20260720c"></script>
  <script src="table-editor.js"></script>
  <script src="rte-image.js"></script>
  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const esc = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
      const fmt = (iso) => { try { return new Date(iso).toLocaleDateString('ko-KR'); } catch (e) { return ''; } };
      const sizeStr = (b) => { if (!b) return ''; const u = ['B', 'KB', 'MB', 'GB']; let i = 0, n = b; while (n >= 1024 && i < 3) { n /= 1024; i++; } return n.toFixed(n < 10 && i > 0 ? 1 : 0) + u[i]; };

      function showLogin() { $('login-view').style.display = 'block'; $('editor-view').style.display = 'none'; }
      function showEditor() { $('login-view').style.display = 'none'; $('editor-view').style.display = 'block'; loadList(); }
      fetch('/api/admin/me').then((r) => r.json()).then((d) => (d.admin ? showEditor() : showLogin())).catch(showLogin);

      $('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: $('password').value }) })
          .then((r) => { if (r.ok) { $('password').value = ''; showEditor(); } else $('login-msg').textContent = '비밀번호가 올바르지 않습니다.'; });
      });
      $('logout-btn').addEventListener('click', () => fetch('/api/admin/logout', { method: 'POST' }).then(showLogin));

      function bindRTE() {
        const editor = $('body');
        const exec = (cmd, val) => { editor.focus(); document.execCommand(cmd, false, val || null); };
        document.querySelectorAll('#rte-toolbar button[data-cmd]').forEach((b) => b.addEventListener('mousedown', (e) => { e.preventDefault(); exec(b.dataset.cmd); }));
        document.querySelectorAll('#rte-toolbar button[data-block]').forEach((b) => b.addEventListener('mousedown', (e) => { e.preventDefault(); exec('formatBlock', '<' + b.dataset.block + '>'); }));
        $('rte-table').addEventListener('mousedown', (e) => {
          e.preventDefault();
          const rows = parseInt(prompt('표 행 수 - 첫 줄은 제목 행', '3'), 10); if (!rows || rows < 1) return;
          const cols = parseInt(prompt('표 열 수', '3'), 10); if (!cols || cols < 1) return;
          let h = '<table><thead><tr>'; for (let c = 0; c < cols; c++) h += '<th>제목' + (c + 1) + '</th>';
          h += '</tr></thead><tbody>';
          for (let r = 0; r < rows - 1; r++) { h += '<tr>'; for (let c = 0; c < cols; c++) h += '<td>내용</td>'; h += '</tr>'; }
          h += '</tbody></table><p><br></p>';
          editor.focus(); document.execCommand('insertHTML', false, h);
        });
      }
      bindRTE();
      if (window.initTableEditor) initTableEditor($('body'), $('table-toolbar'));
      if (window.bindImageInsert) bindImageInsert($('body'), $('rte-img'));

      function resetForm() {
        $('res-form').reset(); $('edit-id').value = ''; $('body').innerHTML = ''; $('file-hint').textContent = ''; $('file').required = true;
        $('editor-title').textContent = '새 자료 등록'; $('save-btn').textContent = '등록하기'; $('cancel-btn').style.display = 'none'; $('form-msg').textContent = '';
      }
      $('cancel-btn').addEventListener('click', resetForm);

      function refreshCategoryOptions(items) {
        var sel = $('category'); if (!sel) return;
        var have = {};
        Array.prototype.forEach.call(sel.options, function (o) { have[o.value] = 1; });
        (items || []).forEach(function (r) {
          var c = (r.category || '').trim();
          if (c && !have[c]) {
            var o = document.createElement('option'); o.value = c; o.textContent = c;
            sel.appendChild(o); have[c] = 1;
          }
        });
      }
      function addCategoryOption() {
        var sel = $('category');
        var name = (window.prompt('추가할 분류명을 입력하세요') || '').trim();
        if (!name) return;
        var exists = Array.prototype.some.call(sel.options, function (o) { return o.value === name; });
        if (!exists) { var o = document.createElement('option'); o.value = name; o.textContent = name; sel.appendChild(o); }
        sel.value = name;
      }
      if ($('add-cat-btn')) $('add-cat-btn').addEventListener('click', addCategoryOption);

      function loadList() {
        fetch('/api/admin/resources').then((r) => r.json()).then((items) => {
          refreshCategoryOptions(items);
          if (!items.length) { $('admin-list').innerHTML = '<p class="empty-note" style="padding:var(--spacing-32) 0">등록된 자료가 없습니다.</p>'; return; }
          $('admin-list').innerHTML = items.map((r) => `
            <div class="admin__row" data-id="${esc(r.id)}">
              <div class="admin__row-main">
                <strong>${esc(r.title)}</strong>
                <span>${r.status === 'draft' ? '비공개' : '게시'}${r.isBrochure ? ' · 회사소개서' : ''} · ${esc(r.category || '기타')} · ${esc(r.originalName || '')} ${r.size ? '· ' + sizeStr(r.size) : ''} · 다운로드 ${r.downloads || 0} · ${fmt(r.createdAt)}</span>
              </div>
              <a class="btn btn--ghost btn--sm" href="/api/resources/${encodeURIComponent(r.id)}/download">받기</a>
              <a class="btn btn--ghost btn--sm" href="resource-detail.html?id=${encodeURIComponent(r.id)}">보기</a>
              <button class="btn btn--ghost btn--sm act-edit">수정</button>
              <button class="btn btn--ghost btn--sm act-del">삭제</button>
            </div>`).join('');
        });
      }

      $('res-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const id = $('edit-id').value;
        const fd = new FormData();
        fd.append('title', $('title').value);
        fd.append('category', $('category').value);
        fd.append('description', $('description').value);
        fd.append('body', $('body').innerHTML.trim());
        fd.append('seoTitle', $('seoTitle').value);
        fd.append('seoDescription', $('seoDescription').value);
        fd.append('ogImage', $('ogImage').value);
        fd.append('status', $('status').value);
        fd.append('isBrochure', $('isBrochure').checked ? 'true' : 'false');
        if ($('file').files[0]) fd.append('file', $('file').files[0]);
        if (!id && !$('file').files[0]) { $('form-msg').textContent = '파일을 첨부해 주세요.'; return; }
        $('form-msg').textContent = '저장 중…';
        fetch(id ? '/api/resources/' + encodeURIComponent(id) : '/api/resources', { method: id ? 'PUT' : 'POST', body: fd })
          .then(async (r) => { const d = await r.json().catch(() => ({})); if (!r.ok) throw new Error(d.message || '저장 실패'); return d; })
          .then(() => { resetForm(); $('form-msg').textContent = '저장되었습니다.'; loadList(); setTimeout(() => ($('form-msg').textContent = ''), 2500); })
          .catch((err) => { $('form-msg').textContent = err.message; });
      });

      $('admin-list').addEventListener('click', (e) => {
        const row = e.target.closest('.admin__row'); if (!row) return;
        const id = row.dataset.id;
        if (e.target.classList.contains('act-del')) {
          if (!confirm('이 자료를 삭제할까요?')) return;
          fetch('/api/resources/' + encodeURIComponent(id), { method: 'DELETE' }).then(loadList);
        } else if (e.target.classList.contains('act-edit')) {
          fetch('/api/admin/resources').then((r) => r.json()).then((items) => {
            const r = items.find((x) => x.id === id); if (!r) return;
            $('edit-id').value = r.id; $('title').value = r.title || ''; $('category').value = r.category || '기타'; $('description').value = r.description || ''; $('body').innerHTML = r.body || ''; $('seoTitle').value = r.seoTitle || ''; $('seoDescription').value = r.seoDescription || ''; $('ogImage').value = r.ogImage || ''; $('status').value = r.status === 'draft' ? 'draft' : 'published'; $('isBrochure').checked = !!r.isBrochure;
            $('file').value = ''; $('file').required = false; $('file-hint').textContent = '(현재: ' + (r.originalName || '') + ' — 새 파일 선택 시에만 교체)';
            $('editor-title').textContent = '자료 수정'; $('save-btn').textContent = '수정 저장'; $('cancel-btn').style.display = 'inline-flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        }
      });
    })();
  </script>
</body>
</html>
