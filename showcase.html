<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맞춤 시험 장비 — k.veritas</title>
  <meta name="description" content="k.veritas가 생산·납품한 제품 사례. 카테고리별로 살펴보고 상세 사양을 확인하세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260718q" />
  <script>document.documentElement.classList.add("reveal-on");setTimeout(function(){window.__revealInit||document.documentElement.classList.add("reveal-off")},3000);</script>
</head>
<body class="site-hp">
  <div id="site-nav"></div>

  <main>
    <div class="pdp">
      <!-- ============ 사이드바 ============ -->
      <aside class="pdp__sidebar">
        <div class="pdp-side__block">
          <p class="pdp-side__label">제품군</p>
          <nav class="pdp-switch">
            <a href="product-parts.html">가구 내구성 시험기</a>
            <a href="product-mold.html">금속·재료 시험기</a>
            <a href="product-module.html">내구성·피로 시험기</a>
            <a href="showcase.html" class="is-current">맞춤 시험 장비</a>
          </nav>
        </div>

        <div class="pdp-side__block pdp-side__toc-block">
          <p class="pdp-side__label">카테고리</p>
          <nav class="pdp-toc pdp-cats" id="prodcat-cats">
            <a data-cat="" class="is-active">전체</a>
          </nav>
        </div>

        <div class="pdp-side__block pdp-side__cta">
          <p class="pdp-side__label">빠른 견적</p>
          <p>찾으시는 제품과 유사한 사양이 있으면 도면·수량과 함께 문의해 주세요.</p>
          <a href="support.html#contact" class="btn btn--primary">견적 문의하기</a>
        </div>
      </aside>

      <!-- ============ 메인 ============ -->
      <div class="pdp__main">
        <!-- 툴바 -->
        <div class="pdp-toolbar">
          <div class="pdp-toolbar__id">
            <div class="pdp-crumb"><a href="products.html">제품소개</a><span>›</span> PRODUCTS</div>
            <h1 class="pdp-toolbar__title" id="prodcat-title">맞춤 시험 장비</h1>
          </div>
          <div class="pdp-toolbar__actions">
            <button type="button" class="pdp-tool" data-pdp-action="share" title="공유">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
              <span>공유</span>
            </button>
          </div>
        </div>

        <section class="pdp-sec" id="catalog" style="border-bottom:0">
          <p class="prodcat-meta" id="prodcat-meta">불러오는 중…</p>
          <div class="prodcat-grid" id="prodcat-grid" aria-live="polite">
            <div class="list-skeleton list-skeleton--cards" aria-busy="true" style="grid-column:1/-1"></div>
          </div>
          <nav class="pager" id="prodcat-pager" aria-label="페이지"></nav>
        </section>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="site-base.js?v=20260718f"></script>
  <script src="site.js?v=20260718f"></script>
  <script>
  (function () {
    var PAGE_SIZE = 40;            /* 4열 × 10행 */
    var grid = document.getElementById('prodcat-grid');
    var pager = document.getElementById('prodcat-pager');
    var meta = document.getElementById('prodcat-meta');
    var catsNav = document.getElementById('prodcat-cats');
    var all = [];
    var state = { cat: '', page: 1 };

    var esc = function (s) { return (s || '').replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); };

    function thumbOf(p) {
      return (p.thumbs && p.thumbs[0]) || (p.images && p.images[0]) || '';
    }
    function catOf(p) { return p.category || p.industry || ''; }
    /* 데이터시트 카드 — 모델코드/특징/스펙 파생 */
    function modelCode(p) {
      if (p.model) return String(p.model).trim().toUpperCase();
      var raw = String(p.id || '').trim().toUpperCase();
      // 짧은 제품코드(kv001 등)만 KV-001 형태로. 타임스탬프 id 는 제외(호출부에서 KV-번호로 대체)
      var m = raw.match(/^([A-Z]{1,4})[-\s]?(\d{1,4})$/);
      return m ? (m[1] + '-' + m[2]) : '';
    }
    function featTokens(p) {
      var src = p.material || '';
      if (!src && Array.isArray(p.specs) && p.specs[0]) src = p.specs[0].value || '';
      var arr = src.split(/[·,\/]/).map(function (s) { return s.trim(); }).filter(Boolean);
      return arr.slice(0, 3);
    }

    var PUB_INDEX = 'https://firestore.googleapis.com/v1/projects/production-management-e70fd/databases/(default)/documents/pages/products-index';
    function loadPublished() {
      return fetch(PUB_INDEX, { cache: 'no-store' })
        .then(function (r) { if (!r.ok) throw 0; return r.json(); })
        .then(function (doc) {
          var s = doc && doc.fields && doc.fields.json && doc.fields.json.stringValue;
          if (!s) throw 0;
          return JSON.parse(s);
        });
    }
    function loadProducts() {
      return loadPublished()
        .catch(function () { return fetch('/api/products').then(function (r) { if (!r.ok) throw 0; return r.json(); }); })
        .catch(function () { return fetch('static-api/products.json').then(function (r) { return r.json(); }); })
        .then(function (data) {
          var list = Array.isArray(data) ? data : (data.items || data.products || []);
          return list.filter(function (p) { return p && p.status !== 'draft' && p.status !== 'hidden'; })
            .sort(function (a, b) {
              var o = (a.order || 0) - (b.order || 0);
              if (o) return o;
              return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
            });
        });
    }

    function loadCategories() {
      return fetch('static-api/categories.json')
        .then(function (r) { if (!r.ok) throw 0; return r.json(); })
        .catch(function () { return []; });
    }

    function renderCats(cats) {
      var uniq = [];
      cats.forEach(function (c) { if (c && uniq.indexOf(c) === -1) uniq.push(c); });
      /* 데이터에 실제로 존재하는 카테고리도 보강 */
      all.forEach(function (p) { var c = catOf(p); if (c && uniq.indexOf(c) === -1) uniq.push(c); });
      var html = '<a data-cat="" class="' + (state.cat === '' ? 'is-active' : '') + '">전체</a>';
      uniq.forEach(function (c) {
        html += '<a data-cat="' + esc(c) + '" class="' + (state.cat === c ? 'is-active' : '') + '">' + esc(c) + '</a>';
      });
      catsNav.innerHTML = html;
    }

    function filtered() {
      if (!state.cat) return all;
      return all.filter(function (p) { return catOf(p) === state.cat; });
    }

    function pageWindow(cur, total) {
      var out = [];
      if (total <= 7) { for (var i = 1; i <= total; i++) out.push(i); return out; }
      out.push(1);
      var lo = Math.max(2, cur - 1), hi = Math.min(total - 1, cur + 1);
      if (lo > 2) out.push('…');
      for (var j = lo; j <= hi; j++) out.push(j);
      if (hi < total - 1) out.push('…');
      out.push(total);
      return out;
    }

    function renderPager(total) {
      if (total <= 1) { pager.innerHTML = ''; return; }
      var html = '';
      html += '<button type="button" data-page="' + (state.page - 1) + '"' + (state.page === 1 ? ' disabled' : '') + ' aria-label="이전">‹</button>';
      pageWindow(state.page, total).forEach(function (n) {
        if (n === '…') { html += '<span class="pager__gap">…</span>'; return; }
        html += '<button type="button" data-page="' + n + '" class="' + (n === state.page ? 'is-current' : '') + '"' + (n === state.page ? ' aria-current="page"' : '') + '>' + n + '</button>';
      });
      html += '<button type="button" data-page="' + (state.page + 1) + '"' + (state.page === total ? ' disabled' : '') + ' aria-label="다음">›</button>';
      pager.innerHTML = html;
    }

    function render() {
      var list = filtered();
      var total = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
      if (state.page > total) state.page = total;
      var start = (state.page - 1) * PAGE_SIZE;
      var slice = list.slice(start, start + PAGE_SIZE);

      meta.innerHTML = '총 <b>' + list.length + '</b>개' + (state.cat ? ' · ' + esc(state.cat) : '') +
        ' · ' + state.page + ' / ' + total + ' 페이지';

      if (!slice.length) {
        grid.innerHTML = '<p class="empty-note" style="grid-column:1/-1">표시할 제품이 없습니다.</p>';
      } else {
        grid.innerHTML = slice.map(function (p, i) {
          var t = thumbOf(p);
          var media = t
            ? '<span class="prod-card__media"><img src="' + esc(t) + '" alt="' + esc(p.title) + '" loading="lazy" decoding="async" /></span>'
            : '<span class="prod-card__media"><span class="prod-card__ph">NO IMAGE</span></span>';
          var model = modelCode(p);
          var feats = featTokens(p);
          var summaryText = (p.summary || '').trim();
          // 요약이 있으면 카드 설명으로 우선 표시(스펙은 아래 표에 별도 노출), 없을 때만 스펙 기반 특징
          var featHtml = summaryText
            ? '<p class="prod-card__lead">' + esc(summaryText).replace(/\n+/g, ' ') + '</p>'
            : (feats.length ? '<ul class="prod-card__feats">' + feats.map(function (f) { return '<li>' + esc(f) + '</li>'; }).join('') + '</ul>' : '');
          // 커스텀 스펙(관리자 편집) 우선, 없으면 기존 필드로 폴백
          var rows = [];
          if (p.category) rows.push(['분야', p.category]);
          if (Array.isArray(p.specs) && p.specs.length) {
            p.specs.forEach(function (s) { if (s && s.value) rows.push([s.label || '', s.value]); });
          } else {
            if (p.industry) rows.push(['산업군', p.industry]);
            if (p.process) rows.push(['공정', p.process]);
          }
          rows = rows.slice(0, 4);
          var specHtml = rows.length
            ? '<dl class="prod-card__spec">' + rows.map(function (r) {
                return '<div><dt>' + esc(r[0]) + '</dt><dd>' + esc(r[1]) + '</dd></div>';
              }).join('') + '</dl>'
            : '';
          var num = ('0' + (start + i + 1)).slice(-2);
          var modelText = model || ('KV-' + num);
          return '<a class="prod-card" href="showcase-detail.html?id=' + encodeURIComponent(p.id) + '">' +
            media +
            '<span class="prod-card__b">' +
              '<span class="prod-card__model">MODEL ' + esc(modelText) + '</span>' +
              '<h3>' + esc(p.title || '(제목 없음)') + '</h3>' +
              featHtml +
              specHtml +
            '</span>' +
          '</a>';
        }).join('');
      }
      renderPager(total);
    }

    function goTo(page) {
      state.page = page;
      render();
      var top = document.getElementById('catalog');
      if (top) window.scrollTo({ top: Math.max(0, top.getBoundingClientRect().top + window.scrollY - 100), behavior: 'smooth' });
    }

    /* 이벤트 위임 */
    catsNav.addEventListener('click', function (e) {
      var a = e.target.closest('a[data-cat]');
      if (!a) return;
      e.preventDefault();
      state.cat = a.getAttribute('data-cat') || '';
      state.page = 1;
      Array.prototype.forEach.call(catsNav.querySelectorAll('a'), function (x) { x.classList.remove('is-active'); });
      a.classList.add('is-active');
      render();
    });
    pager.addEventListener('click', function (e) {
      var b = e.target.closest('button[data-page]');
      if (!b || b.disabled) return;
      var n = parseInt(b.getAttribute('data-page'), 10);
      if (n >= 1) goTo(n);
    });

    Promise.all([loadProducts(), loadCategories()]).then(function (res) {
      all = res[0] || [];
      var qpCat = new URLSearchParams(location.search).get('cat');
      if (qpCat) state.cat = qpCat;
      renderCats(res[1] || []);
      render();
    }).catch(function () {
      meta.textContent = '';
      grid.innerHTML = '<p class="empty-note" style="grid-column:1/-1">제품을 불러오지 못했습니다.</p>';
      pager.innerHTML = '';
    });
  })();
  </script>
</body>
</html>
